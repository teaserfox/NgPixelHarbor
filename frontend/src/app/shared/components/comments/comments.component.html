<section class="comments">
  <div class="container">
    <div class="comments-title">Комментарии к статье</div>
    <div class="comments-auth" *ngIf="!(isLogged$ | async)">
      Чтобы оставлять комментарии,
      <a routerLink="/login">войдите</a>
      или <a routerLink="/signup">зарегистрируйтесь</a>.
    </div>
    <div class="comments-auth-input" *ngIf="(isLogged$ | async)">
      <div class="comments-auth-input-text"
           *ngIf="allCommentsCount === 0">
        Будьте первым, кто оставит свой комментарий к статье!
      </div>
      <textarea
        class="comments-input"
        [(ngModel)]="commentText"
        placeholder="Напишите Ваш комментарий к статье...">
      </textarea>
      <button class="button" (click)="sendComment()"
              [disabled]="!commentText.trim()">
        Опубликовать комментарий
      </button>
    </div>
    <div class="comments-loader">
      <app-loader></app-loader>
    </div>
    <div class="comments-group-items">
      <div class="comments-group-item" *ngFor="let comment of visibleComments">
        <div class="comments-group-item-profile">
          <div class="avatar">
            <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <mask id="mask0_24618_359" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0" width="60"
                    height="60">
                <circle cx="30" cy="30" r="30" fill="#C4C4C4"/>
              </mask>
              <g mask="url(#mask0_24618_359)">
                <circle cx="29.9751" cy="22.7368" r="11.7368" stroke="#709FDC" stroke-width="2"/>
                <path fill-rule="evenodd" clip-rule="evenodd"
                      d="M49.942 55.0001C49.3422 44.4932 40.632 36.158 29.9749 36.158C19.3179 36.158 10.6077 44.4932 10.0079 55.0001H8.00488C8.607 43.388 18.2131 34.158 29.9749 34.158C41.7368 34.158 51.3429 43.388 51.945 55.0001H49.942Z"
                      fill="#709FDC"/>
              </g>
            </svg>
          </div>
          <div class="details">
            <div class="name">{{ comment.user.name }}</div>
            <div class="data">{{ comment.date | date:'dd.MM.yyyy HH:mm' }}</div>
          </div>
        </div>
        <div class="comments-group-item-comment">{{ comment.text }}</div>
        <div class="comments-group-item-icons">
          <div class="like"
               [class.disabled]="!(isLogged$ | async)"
               [class.active]="comment.userAction === 'like'"
               (click)="applyAction(comment, 'like')">
            {{comment.likesCount}}
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.47998 18.35L10.58 20.75C10.98 21.15 11.88 21.35 12.48 21.35H16.28C17.48 21.35 18.78 20.45 19.08 19.25L21.48 11.95C21.98 10.55 21.08 9.34997 19.58 9.34997H15.58C14.98 9.34997 14.48 8.84997 14.58 8.14997L15.08 4.94997C15.28 4.04997 14.68 3.04997 13.78 2.74997C12.98 2.44997 11.98 2.84997 11.58 3.44997L7.47998 9.54997" stroke="#071739" stroke-width="1.5" stroke-miterlimit="10"/>
              <path d="M2.37988 18.35V8.55002C2.37988 7.15002 2.97988 6.65002 4.37988 6.65002H5.37988C6.77988 6.65002 7.37988 7.15002 7.37988 8.55002V18.35C7.37988 19.75 6.77988 20.25 5.37988 20.25H4.37988C2.97988 20.25 2.37988 19.75 2.37988 18.35Z" stroke="#071739" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="dislike"
               [class.disabled]="!(isLogged$ | async)"
               [class.active]="comment.userAction === 'dislike'"
               (click)="applyAction(comment, 'dislike')">
            {{comment.dislikesCount}}
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M16.5197 5.65002L13.4197 3.25002C13.0197 2.85002 12.1197 2.65002 11.5197 2.65002H7.71973C6.51973 2.65002 5.21973 3.55002 4.91973 4.75002L2.51973 12.05C2.01973 13.45 2.91973 14.65 4.41973 14.65H8.41973C9.01973 14.65 9.51973 15.15 9.41973 15.85L8.91973 19.05C8.71973 19.95 9.31973 20.95 10.2197 21.25C11.0197 21.55 12.0197 21.15 12.4197 20.55L16.5197 14.45"
                stroke="#071739" stroke-width="1.5" stroke-miterlimit="10"/>
              <path
                d="M21.6201 5.65V15.45C21.6201 16.85 21.0201 17.35 19.6201 17.35H18.6201C17.2201 17.35 16.6201 16.85 16.6201 15.45V5.65C16.6201 4.25 17.2201 3.75 18.6201 3.75H19.6201C21.0201 3.75 21.6201 4.25 21.6201 5.65Z"
                stroke="#071739" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="spam"
               [class.disabled]="!(isLogged$ | async)"
               (click)="applyAction(comment, 'violate')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 22C17.5 22 22 17.5 22 12C22 6.5 17.5 2 12 2C6.5 2 2 6.5 2 12C2 17.5 6.5 22 12 22Z"
                    stroke="#071739" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 8V13" stroke="#071739" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M11.9946 16H12.0036" stroke="#071739" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="load-more-comments"
           *ngIf="canLoadMore"
           (click)="loadMoreComments()">
        Загрузить ещё комментарии
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M10 14C9.41668 14 8.83335 13.775 8.39168 13.3334L2.95835 7.90003C2.71668 7.65837 2.71668 7.25837 2.95835 7.0167C3.20002 6.77503 3.60002 6.77503 3.84168 7.0167L9.27502 12.45C9.67502 12.85 10.325 12.85 10.725 12.45L16.1583 7.0167C16.4 6.77503 16.8 6.77503 17.0417 7.0167C17.2833 7.25837 17.2833 7.65837 17.0417 7.90003L11.6083 13.3334C11.1667 13.775 10.5833 14 10 14Z"
            fill="#709FDC"/>
        </svg>
      </div>
    </div>
  </div>
</section>
